# ==========================================
# 模型基礎設定 (LLM / VLM / Embedding)
# ==========================================

generation:
  # 預設生成文字時的溫度 (0.0 表示最保守/一致，大於 0 增加隨機性)
  temperature: 0.1
  
  # Top-p sampling
  top_p: 0.95
  
  # 最大輸出 token 數量限制
  max_tokens: 2048
  
  # 提供給模型的預設 System Prompt (可被各別流程覆寫)
  default_system_prompt: >
    你是一個專業且嚴謹的企業知識庫助手。
    請根據提供的上下文 (Context) 來回答使用者的問題。
    如果上下文中沒有提到，請據實回答不知道，或者請使用者提供更多資訊。
    不要隨意捏造答案。

embedding:
  # 批次處理時，一次處理的文本數量
  batch_size: 32

ocr_vision:
  # 圖片轉文字/表格的任務提示
  # 會將此文本與圖片一起送給 vLLM / Ollama
  caption_prompt: "詳細描述這張圖片的內容，包含所有的可見細節與文字。如果是圖表，請說明其趨勢與數據。"
  table_extract_prompt: "請找出圖片中的表格，並將其完美還原為 Markdown table 格式。如果有多個表格請依序輸出。"
